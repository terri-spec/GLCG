<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Career Interest Profile & Interpretive Report</title>
<style>
:root{--navy:#315c70;--orange:#eb681f;--ink:#262626;--muted:#666;--line:#9fb5bf;--box:#edf0f2;--R:#ed3438;--I:#1597d4;--A:#54a956;--S:#9a63a8;--E:#ef7d16;--C:#aaa127}*{box-sizing:border-box}body{margin:0;background:#dde3e6;color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.38}.report{width:min(980px,calc(100% - 24px));margin:24px auto}.sheet{background:white;min-height:1120px;padding:54px 64px;margin:0 0 24px;box-shadow:0 3px 16px #0002;position:relative}.cover{padding-top:110px}.brandmark{margin-left:auto;width:126px;height:126px;border:14px solid var(--navy);border-radius:50%;display:grid;place-items:center;color:var(--navy);font:bold 36px Georgia,serif}.cover-rule{height:30px;background:var(--navy);margin:86px 0 43px}.cover h1{font-size:30px;line-height:1.12;margin:0 0 6px}.cover h2{font-size:21px;margin:0}.orange{color:var(--orange)}.prepared{text-align:right;margin-top:70px;font-size:19px}.prepared strong{display:block;color:var(--orange);font-size:24px}.disclaimer{position:absolute;bottom:38px;left:64px;right:64px;font-size:10px;color:#666;border-top:1px solid #bbb;padding-top:10px}.running{display:flex;justify-content:space-between;gap:16px;font-size:13px;font-weight:bold;margin-bottom:24px}.running .person{color:var(--orange)}.section-title{display:flex;justify-content:space-between;align-items:end;border-bottom:2px solid #4c4c4c;margin:0 0 12px;color:var(--navy)}.section-title h2{font-size:20px;margin:0 0 3px}.section-title span{font-weight:bold}.lead{font:16px/1.45 Georgia,serif;margin:0 0 16px}.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}.box{background:var(--box);border:1px dotted var(--navy);border-radius:16px;padding:14px 16px;box-shadow:0 5px 5px #0002;margin:16px 0}.box-title{color:var(--orange);font-size:15px;font-weight:bold;border-bottom:1px solid #555;padding-bottom:4px;margin-bottom:7px}.theme-table{width:100%;border-collapse:collapse;margin-top:12px;border-top:4px solid var(--navy);border-bottom:4px solid var(--navy)}.theme-table th{background:#e5e7e8;font-size:11px;text-align:left;padding:6px;border-bottom:1px solid #777}.theme-table td{padding:8px;border-bottom:1px solid #bbb;vertical-align:top}.theme-name{font-weight:bold;font-size:16px}.score-table{width:100%;border-collapse:collapse;border-top:4px solid var(--navy);border-bottom:4px solid var(--navy);margin:18px 0}.score-table th{font-size:10px;background:#e5e7e8;padding:5px;border-bottom:1px solid #777}.score-table td{padding:5px;border-bottom:1px solid #c4c4c4}.bar-track{height:13px;background:repeating-linear-gradient(90deg,#fff 0,#fff calc(20% - 1px),#ccc calc(20% - 1px),#ccc 20%);position:relative}.bar-fill{height:100%;min-width:2px;color:#fff;font-size:9px;font-weight:bold;text-align:right;padding-right:5px;line-height:13px}.score{font-weight:bold;text-align:center}.activity-list{columns:2;column-gap:28px;margin:9px 0;padding-left:22px}.activity-list li{break-inside:avoid;margin:0 0 7px;font-weight:bold}.minor-list{margin:8px 0;padding-left:20px}.minor-list li{margin:0 0 6px}.subsection{color:var(--navy);font-size:18px;border-bottom:2px solid var(--navy);padding-bottom:3px;margin:22px 0 9px}.theme-block{margin:0 0 15px}.theme-block h3{font-size:16px;margin:0;border-bottom:1px solid #777;padding-bottom:3px}.theme-block p{margin:6px 0}.summary-box{background:var(--box);border:1px dotted var(--navy);border-radius:16px;padding:18px;box-shadow:0 5px 5px #0002}.summary-section{margin:0 0 24px}.summary-section h3{color:var(--orange);font-size:15px;border-bottom:1px solid #555;margin:0 0 7px;padding-bottom:3px}.summary-cols{columns:2;column-gap:34px}.summary-cols ul{margin:0;padding-left:18px}.summary-cols li{break-inside:avoid;margin-bottom:6px;font-weight:bold}.actions{display:flex;gap:10px;margin:0 auto 28px;width:min(980px,calc(100% - 24px))}.actions button,.actions a{background:var(--navy);color:white;border:0;border-radius:5px;padding:11px 16px;font-weight:bold;text-decoration:none;cursor:pointer}.actions .secondary{background:#69777d}.empty{background:white;padding:44px;box-shadow:0 3px 16px #0002}.empty h1{color:var(--navy)}.foot{position:absolute;bottom:24px;right:64px;font-size:11px;color:#666}@media(max-width:720px){body{font-size:12px}.report{width:100%;margin:0}.sheet{min-height:0;padding:30px 22px;margin-bottom:10px;box-shadow:none}.cover{min-height:720px}.report-grid{grid-template-columns:1fr}.activity-list,.summary-cols{columns:1}.running{font-size:11px}.disclaimer{left:22px;right:22px}.foot{right:22px}.actions{width:calc(100% - 24px)}}@media print{body{background:white}.report{width:100%;margin:0}.sheet{width:100%;height:10in;min-height:10in;margin:0;box-shadow:none;page-break-after:always;padding:.45in .55in}.sheet:last-child{page-break-after:auto}.actions{display:none}.cover-rule{margin-top:70px}.disclaimer{bottom:18px}.foot{bottom:12px}}
</style></head><body><main class="report" id="report"><section class="empty" id="empty"><h1>No completed assessment found</h1><p>Complete the participant assessment on this device. The latest profile will appear here automatically.</p><a href="career-interest-assessment.html">Open participant assessment</a></section></main><div class="actions" id="actions" hidden><button onclick="print()">Print report</button><a href="career-interest-assessment.html">Return to assessment</a><button class="secondary" id="clearBtn">Clear saved result</button></div>
<script>
const ORDER='RIASEC'.split('');
const T={R:{name:'Hands-on',color:'#ed3438',interests:'Tools, environments, equipment, physical activity',work:'Building, repairing, producing, operating, field work',skills:'Practical reasoning, coordination, mechanical learning',values:'Tangible results, usefulness, practicality',families:['Skilled trades','Technical operations','Environmental field work','Production and logistics','Public safety']},I:{name:'Analytical',color:'#1597d4',interests:'Evidence, systems, research, complex questions',work:'Investigating, analyzing, testing, studying',skills:'Critical thinking, research, problem solving',values:'Curiosity, knowledge, independence',families:['Research','Science and technology','Data and analytics','Health science','Strategy and evaluation']},A:{name:'Creative',color:'#54a956',interests:'Originality, design, expression, culture',work:'Writing, designing, performing, creating',skills:'Imagination, communication, aesthetic judgment',values:'Beauty, flexibility, self-expression',families:['Design','Writing and publishing','Media and communications','Performing arts','Creative services']},S:{name:'Helping',color:'#9a63a8',interests:'People, learning, teamwork, community',work:'Teaching, counseling, coaching, supporting',skills:'Listening, empathy, communication',values:'Service, cooperation, human growth',families:['Education','Counseling and human services','Healthcare support','Community programs','Training and development']},E:{name:'Influencing',color:'#ef7d16',interests:'Leadership, enterprise, persuasion, decisions',work:'Leading, presenting, negotiating, initiating',skills:'Persuasion, direction, verbal influence',values:'Impact, initiative, achievement',families:['Management','Entrepreneurship','Business development','Advocacy and public affairs','Program leadership']},C:{name:'Organizing',color:'#aaa127',interests:'Systems, information, accuracy, planning',work:'Coordinating, recording, scheduling, checking',skills:'Organization, detail, process management',values:'Reliability, efficiency, stability',families:['Administration','Project coordination','Finance operations','Quality assurance','Information management']}};
const ITEMS=[['R','Repair or assemble something using tools'],['I','Figure out why a device or process is not working'],['A','Redesign a room, object, or visual display'],['S','Show someone how to complete a practical task'],['E','Coordinate people to finish a time-sensitive project'],['C','Create a checklist that prevents steps from being missed'],['I','Compare sources to reach a well-supported conclusion'],['A','Write a story, article, script, or personal essay'],['S','Explain a difficult idea in a way someone can understand'],['E','Present a proposal and win support for it'],['C','Organize reference material so it is easy to retrieve'],['R','Learn a new technique by practicing it hands-on'],['S','Listen carefully while someone works through a concern'],['E','Lead a group discussion toward a decision'],['C','Schedule people, tasks, and resources for an event'],['A','Plan an experience that feels memorable and original'],['R','Help set up equipment or a physical space for an event'],['I','Study patterns in how groups or communities behave'],['E','Launch a new project with an uncertain outcome'],['C','Track details, deadlines, and progress across a project'],['I','Analyze data to identify an unexpected pattern'],['R','Work outdoors or in a changing physical environment'],['S','Coach someone as they build confidence or skill'],['A','Experiment with multiple ways to express the same idea'],['C','Maintain accurate records that others depend on'],['R','Produce a visible, concrete result by the end of the day'],['A','Have freedom to make aesthetic or creative choices'],['I','Spend focused time researching an unanswered question'],['E','Negotiate priorities, resources, or an agreement'],['S','Contribute directly to another person’s growth or wellbeing']];
const BLENDS={RI:'applied investigation: understanding how things work and turning analysis into practical solutions',RA:'hands-on creation: making tangible things with originality, design, or craft',RS:'practical service: helping people through direct action, instruction, or concrete support',RE:'action-oriented leadership: mobilizing people and resources toward visible outcomes',RC:'reliable operations: building, maintaining, and improving practical systems',IA:'idea-centered creativity: combining investigation with writing, design, invention, or conceptual work',IS:'evidence-informed helping: using knowledge and analysis to teach, counsel, or improve wellbeing',IE:'strategic innovation: turning complex insight into decisions, ventures, or organizational direction',IC:'systematic analysis: working carefully with information, patterns, accuracy, and evidence',AS:'creative communication: using expression to teach, connect, advocate, or support growth',AE:'creative influence: shaping ideas, audiences, brands, or experiences through initiative',AC:'structured creativity: producing original work within plans, systems, or technical constraints',SE:'people-centered leadership: motivating, teaching, advocating, and guiding group outcomes',SC:'organized service: supporting people through reliable coordination, records, and systems',EC:'business execution: combining initiative and persuasion with planning, organization, and follow-through'};
function pair(a,b){return[a,b].sort((x,y)=>ORDER.indexOf(x)-ORDER.indexOf(y)).join('')}function level(v){return v>=80?'Very high':v>=65?'High':v>=40?'Moderate':v>=20?'Little':'Very little'}
function running(d,n,title){return`<div class="running"><span>Career Interest Profile & Interpretive Report</span><span class="person">${d.participant} | Page ${n}</span></div><div class="section-title"><h2>${title}</h2><span>SECTION ${n-1}</span></div>`}
function load(){try{const d=JSON.parse(localStorage.getItem('careerInterestDemoLatest')||'null');if(d&&d.kind==='career-interest-demo'&&d.scores)render(d)}catch{}}
function render(d){const rank=Object.keys(d.scores).sort((a,b)=>d.scores[b]-d.scores[a]||ORDER.indexOf(a)-ORDER.indexOf(b)),top=rank.slice(0,3),low=rank.slice(-2),responses=d.responses||[],activities=ITEMS.map((x,i)=>({theme:x[0],text:x[1],value:responses[i]??0})).sort((a,b)=>b.value-a.value),spread=d.scores[rank[0]]-d.scores[rank[5]],topGap=d.scores[rank[0]]-d.scores[rank[1]],families=[...new Set(top.flatMap(k=>T[k].families))];const themeRows=rank.map(k=>`<tr><td class="theme-name" style="color:${T[k].color}">${T[k].name}</td><td><b>${k}</b></td><td>${T[k].interests}</td><td>${T[k].work}</td><td>${T[k].skills}</td><td>${T[k].values}</td></tr>`).join('');const scoreRows=rank.map(k=>`<tr><td class="theme-name" style="color:${T[k].color}">${T[k].name}</td><td><b>${k}</b></td><td><div class="bar-track"><div class="bar-fill" style="width:${d.scores[k]}%;background:${T[k].color}">${level(d.scores[k]).toUpperCase()}</div></div></td><td class="score" style="color:${T[k].color}">${d.scores[k]}</td></tr>`).join('');const topActs=activities.slice(0,10),lowActs=activities.slice(-5).reverse();const profileNote=topGap<=8?'The two leading themes are closely grouped and should be interpreted as a blend.':`The ${T[top[0]].name} theme is the clearest leading preference in this brief profile.`;const differentiation=spread<25?'The profile is broad and relatively even, suggesting wide curiosity or preferences that depend strongly on context.':spread>=50?'The profile is sharply differentiated; the participant made clear distinctions between more and less appealing activities.':'The profile shows moderate differentiation, with recognizable preferences and some flexibility.';const cover=`<section class="sheet cover"><div class="brandmark">CI</div><div class="cover-rule"></div><h1>Career Interest Profile</h1><h2>Profile and Interpretive Report</h2><p class="orange"><b>Original demonstration assessment</b><br>Six-area career exploration framework</p><div class="prepared">Report prepared for<strong>${d.participant}</strong>${new Date(d.completed).toLocaleDateString()}</div><p class="disclaimer">For demonstration and educational use only. This original report is not standardized, validated, norm-referenced, diagnostic, or affiliated with any commercial assessment publisher. It measures stated preferences, not skills or abilities.</p></section>`;const intro=`<section class="sheet">${running(d,2,'HOW THIS PROFILE CAN HELP')}<p class="lead">This profile organizes responses into six broad patterns of interest. It is designed to support discussion about activities, environments, and career families that may feel engaging. Results should be considered alongside skills, values, lived experience, access needs, education, and opportunity.</p><div class="report-grid"><div><h3 class="subsection">HOW TO USE THE RESULTS</h3><ul class="minor-list"><li>Identify activities that feel naturally engaging.</li><li>Generate career and education questions.</li><li>Compare stated interests with real experiences.</li><li>Plan low-risk exploration before major decisions.</li></ul></div><div><h3 class="subsection">HOW THE REPORT IS ORGANIZED</h3><ol class="minor-list"><li>General interest themes</li><li>Ranked activity interests</li><li>Career-family exploration</li><li>Interpretive summary and next steps</li></ol></div></div><div class="box"><div class="box-title">IMPORTANT INTERPRETIVE NOTE</div>These scores are simple percentages of available points within each theme. Labels describe this response pattern only; they are not comparisons with a normative population.</div><div class="foot">Career Interest Profile | ${d.participant} | Page 2</div></section>`;const themes=`<section class="sheet">${running(d,3,'GENERAL INTEREST THEMES')}<p class="lead">Most people’s interests are reflected by two or three themes. Together they form a pattern that can guide exploration of meaningful activities, work settings, and learning opportunities.</p><table class="theme-table"><thead><tr><th>THEME</th><th>CODE</th><th>INTERESTS</th><th>WORK ACTIVITIES</th><th>POTENTIAL SKILLS</th><th>VALUES</th></tr></thead><tbody>${themeRows}</tbody></table><div class="box"><div class="report-grid"><div><div class="box-title">YOUR HIGHEST THEMES</div><b>${top.map(k=>T[k].name).join(', ')}</b></div><div><div class="box-title">YOUR THEME CODE</div><b style="font-size:22px">${d.code}</b></div></div></div><table class="score-table"><thead><tr><th>THEME</th><th>CODE</th><th>DEMONSTRATION SCORE & INTEREST LEVEL</th><th>SCORE</th></tr></thead><tbody>${scoreRows}</tbody></table><p>${profileNote} ${differentiation}</p><div class="foot">Career Interest Profile | ${d.participant} | Page 3</div></section>`;const activitiesPage=`<section class="sheet">${running(d,4,'ACTIVITY INTERESTS')}<p class="lead">The activity list shows which individual statements received the strongest endorsement. Because each item represents only one example, themes and real-life patterns matter more than any single response.</p><div class="box"><div class="box-title">YOUR TOP ACTIVITY AREAS</div><ol class="activity-list">${topActs.map(x=>`<li>${x.text} <span style="color:${T[x.theme].color}">(${x.theme})</span></li>`).join('')}</ol></div><div class="report-grid"><div><h3 class="subsection">AREAS OF LEAST INTEREST</h3><ul class="minor-list">${lowActs.map(x=>`<li>${x.text} <b style="color:${T[x.theme].color}">(${x.theme})</b></li>`).join('')}</ul></div><div><h3 class="subsection">THEME BLEND</h3><p><b>${top[0]}${top[1]} — ${T[top[0]].name} + ${T[top[1]].name}</b></p><p>This combination suggests ${BLENDS[pair(top[0],top[1])]}. The third theme, ${T[top[2]].name}, may influence the preferred setting or method.</p></div></div><div class="box"><div class="box-title">REFLECTION</div>Which highly rated activities already appear in the participant’s work, education, hobbies, or relationships? Which appealing activities have not yet had a realistic chance to develop?</div><div class="foot">Career Interest Profile | ${d.participant} | Page 4</div></section>`;const careers=`<section class="sheet">${running(d,5,'CAREER-FAMILY EXPLORATION')}<p class="lead">The families below are broad starting points for research. They do not indicate occupations the participant “should” pursue and do not predict ability or success.</p><div class="box"><div class="box-title">CAREER FAMILIES TO EXPLORE</div><div class="summary-cols"><ul>${families.map(x=>`<li>${x}</li>`).join('')}</ul></div></div><h3 class="subsection">LEADING THEME INTERPRETATION</h3>${top.map(k=>`<div class="theme-block"><h3 style="color:${T[k].color}">${T[k].name} — ${level(d.scores[k])}</h3><p>Interest in ${T[k].interests.toLowerCase()}. Potentially satisfying work may include ${T[k].work.toLowerCase()} and settings that value ${T[k].values.toLowerCase()}.</p></div>`).join('')}<h3 class="subsection">POTENTIAL TENSIONS TO EXPLORE</h3><ul class="minor-list"><li>Lower relative interest in ${T[low[0]].name.toLowerCase()} and ${T[low[1]].name.toLowerCase()} activities may indicate tasks that require more purpose, support, or structure.</li><li>A preferred activity can still be a poor fit when values, access needs, training demands, compensation, or workplace culture conflict.</li><li>Ask whether lower ratings reflect genuine disinterest, limited exposure, low confidence, or an unpleasant prior experience.</li></ul><div class="foot">Career Interest Profile | ${d.participant} | Page 5</div></section>`;const summary=`<section class="sheet">${running(d,6,'INTERPRETIVE REPORT SUMMARY')}<p class="lead">This summary brings the strongest themes, activity preferences, work-environment descriptors, and exploration ideas together in one place.</p><div class="summary-box"><div class="summary-section"><h3>YOUR HIGHEST THEMES</h3><div class="report-grid"><ul>${top.map(k=>`<li><b style="color:${T[k].color}">${T[k].name}</b></li>`).join('')}</ul><ul>${top.map(k=>`<li>${T[k].values}</li>`).join('')}</ul></div></div><div class="summary-section"><h3>SPECIFIC INTERESTS FOR WORK, LEISURE, AND LEARNING</h3><div class="summary-cols"><ul>${topActs.slice(0,8).map(x=>`<li>${x.text}</li>`).join('')}</ul></div></div><div class="summary-section"><h3>CAREER FAMILIES THAT MAY BE WORTH EXPLORING</h3><div class="summary-cols"><ul>${families.slice(0,10).map(x=>`<li>${x}</li>`).join('')}</ul></div></div><div class="summary-section"><h3>CLINICAL CONVERSATION PROMPTS</h3><ul><li>What past experiences support—or contradict—this three-theme pattern?</li><li>Which activities create energy, and which merely feel familiar or expected?</li><li>Which work conditions are non-negotiable?</li><li>What barriers, supports, or access needs could shape exploration?</li></ul></div></div><div class="foot">Career Interest Profile | ${d.participant} | Page 6</div></section>`;const next=`<section class="sheet">${running(d,7,'NEXT STEPS')}<p class="lead">Career exploration works best as a series of small tests rather than a single permanent choice. Use these steps to turn the profile into grounded learning.</p><ol style="font-size:16px;line-height:1.55"><li><b>Create an evidence list.</b> Identify three past activities that felt absorbing or meaningful and mark the themes each used.</li><li><b>Research three families.</b> Review real job tasks, training routes, working conditions, compensation, and local opportunities.</li><li><b>Run one low-risk experiment.</b> Try an informational interview, short course, job shadow, volunteer task, portfolio exercise, or project.</li><li><b>Integrate the full picture.</b> Compare interests with skills, values, health and access needs, lifestyle, supports, and financial realities.</li><li><b>Revise the hypothesis.</b> Return to this profile after real-world exposure and update the interpretation rather than treating it as a fixed label.</li></ol><div class="box"><div class="box-title">CLINICIAN NOTE</div>Look for examples, exceptions, and context. A useful interpretation increases curiosity and options; it should not narrow the participant prematurely or substitute for collaborative career counseling.</div><p class="disclaimer">For demonstration and educational use only. This original report is not standardized, validated, norm-referenced, diagnostic, or suitable for hiring, gatekeeping, disability determination, or other high-stakes decisions.</p></section>`;document.querySelector('#report').innerHTML=cover+intro+themes+activitiesPage+careers+summary+next;document.querySelector('#actions').hidden=false;parent.postMessage({type:'CAREER_INTEREST_INTERPRETATION',payload:d},'*');resize()}
function resize(){parent.postMessage({type:'CAREER_INTEREST_HEIGHT',height:document.documentElement.scrollHeight},'*')}document.querySelector('#clearBtn').onclick=()=>{if(confirm('Clear the saved participant result from this device?')){localStorage.removeItem('careerInterestDemoLatest');location.reload()}};new ResizeObserver(resize).observe(document.body);load();resize();
</script></body></html>
