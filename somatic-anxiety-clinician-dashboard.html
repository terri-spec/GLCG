<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Somatic Anxiety Check-Ins - Clinician Dashboard</title>
  <style>
    :root {
      --navy: #14324c;
      --deep: #10283a;
      --sea: #0f6f7d;
      --foam: #eef5f7;
      --panel: #ffffff;
      --line: #bdd0d8;
      --muted: #5d7280;
      --brass: #c3922e;
      --red: #b43131;
      --shadow: 0 14px 32px rgba(16, 40, 58, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--foam);
      color: var(--deep);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      padding: 22px 28px;
      background: var(--navy);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 4px;
      font-size: 25px;
      letter-spacing: 0;
    }

    .topbar p {
      margin-bottom: 0;
      color: rgba(255,255,255,0.78);
    }

    .refresh {
      min-height: 44px;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    main {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .card,
    .filters,
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .card {
      padding: 18px;
    }

    .card strong {
      display: block;
      font-size: 31px;
      line-height: 1;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .filters {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 220px 180px 120px;
      gap: 10px;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--deep);
      background: #fbfdfe;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    th {
      background: var(--navy);
      color: white;
      text-align: left;
      padding: 11px 12px;
      font-size: 13px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #e6f2f5;
      color: var(--sea);
      font-weight: 800;
      white-space: nowrap;
    }

    .flag {
      background: #fff0ed;
      color: var(--red);
    }

    .empty {
      padding: 24px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats,
      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Somatic Anxiety Check-Ins - Clinician Dashboard</h1>
      <p>Great Lakes Counseling Group - clinician review</p>
    </div>
    <button class="refresh" id="refresh">Refresh</button>
  </header>

  <main>
    <section class="stats">
      <div class="card"><strong id="totalCount">0</strong><span>Total Check-Ins</span></div>
      <div class="card"><strong id="weekCount">0</strong><span>This Week</span></div>
      <div class="card"><strong id="flagCount">0</strong><span>Medical Follow-Up Flags</span></div>
      <div class="card"><strong id="clientCount">0</strong><span>Clients</span></div>
    </section>

    <section class="filters">
      <input id="search" type="search" placeholder="Search client name...">
      <select id="weekFilter">
        <option value="">All weeks</option>
        <option value="1">Week 1</option>
        <option value="2">Week 2</option>
        <option value="3">Week 3</option>
        <option value="4">Week 4</option>
      </select>
      <select id="flagFilter">
        <option value="">All results</option>
        <option value="flagged">Medical flags only</option>
      </select>
      <button class="refresh" id="clear" style="background:#e6f2f5;color:#14324c;border-color:#bdd0d8">Clear</button>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>DOB</th>
            <th>Week</th>
            <th>Skill</th>
            <th>Streak</th>
            <th>Tension</th>
            <th>Symptoms</th>
            <th>Flag</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td class="empty" colspan="10">Loading check-ins...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    let checkins = [];

    const rows = document.getElementById("rows");
    const search = document.getElementById("search");
    const weekFilter = document.getElementById("weekFilter");
    const flagFilter = document.getElementById("flagFilter");

    function requestData() {
      window.parent.postMessage({ type: "SOMATIC_ANXIETY_DASHBOARD_REQUEST" }, "*");
    }

    function sameWeek(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return false;
      const now = new Date();
      const start = new Date(now);
      start.setDate(now.getDate() - now.getDay());
      start.setHours(0, 0, 0, 0);
      return date >= start;
    }

    function clientKey(item) {
      return `${item.clientName || ""}|${item.dateOfBirth || ""}`.toLowerCase();
    }

    function streakMap(items) {
      const counts = new Map();
      items.forEach(item => {
        const key = clientKey(item);
        counts.set(key, (counts.get(key) || 0) + 1);
      });
      return counts;
    }

    function renderStats(items) {
      const keys = new Set(items.map(clientKey));
      document.getElementById("totalCount").textContent = items.length;
      document.getElementById("weekCount").textContent = items.filter(item => sameWeek(item.checkinDate || item._createdDate)).length;
      document.getElementById("flagCount").textContent = items.filter(item => item.medicalFollowUpFlag).length;
      document.getElementById("clientCount").textContent = keys.size;
    }

    function filteredItems() {
      const q = search.value.trim().toLowerCase();
      return checkins.filter(item => {
        const matchesSearch = !q || (item.clientName || "").toLowerCase().includes(q);
        const matchesWeek = !weekFilter.value || String(item.week) === weekFilter.value;
        const matchesFlag = flagFilter.value !== "flagged" || item.medicalFollowUpFlag;
        return matchesSearch && matchesWeek && matchesFlag;
      });
    }

    function renderRows() {
      const items = filteredItems();
      const streaks = streakMap(checkins);
      renderStats(checkins);
      if (!items.length) {
        rows.innerHTML = `<tr><td class="empty" colspan="10">No check-ins match these filters.</td></tr>`;
        return;
      }
      rows.innerHTML = items.map(item => {
        const symptoms = Array.isArray(item.symptoms) && item.symptoms.length ? item.symptoms.join(", ") : "None selected";
        const tension = `${item.beforeTension ?? ""} to ${item.afterTension ?? ""}`;
        return `
          <tr>
            <td>${escapeHtml(item.checkinDate || formatDate(item._createdDate))}</td>
            <td><strong>${escapeHtml(item.clientName || "")}</strong></td>
            <td>${escapeHtml(item.dateOfBirth || "")}</td>
            <td><span class="pill">Week ${escapeHtml(item.week || "")}</span></td>
            <td>${escapeHtml(item.skillUsed || "")}</td>
            <td><span class="pill">${streaks.get(clientKey(item)) || 0}</span></td>
            <td>${escapeHtml(tension)}</td>
            <td>${escapeHtml(symptoms)}</td>
            <td>${item.medicalFollowUpFlag ? `<span class="pill flag">Flagged</span>` : ""}</td>
            <td>${escapeHtml(item.reflectionNotes || "")}</td>
          </tr>
        `;
      }).join("");
    }

    function formatDate(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? "" : date.toLocaleDateString();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"\x27]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "\x27": "&#39;"
      }[char]));
    }

    window.addEventListener("message", event => {
      if (!event.data || event.data.type !== "SOMATIC_ANXIETY_DASHBOARD_RESULT") return;
      checkins = Array.isArray(event.data.items) ? event.data.items : [];
      renderRows();
    });

    document.getElementById("refresh").addEventListener("click", requestData);
    search.addEventListener("input", renderRows);
    weekFilter.addEventListener("change", renderRows);
    flagFilter.addEventListener("change", renderRows);
    document.getElementById("clear").addEventListener("click", () => {
      search.value = "";
      weekFilter.value = "";
      flagFilter.value = "";
      renderRows();
    });

    requestData();
  </script>
</body>
</html>
